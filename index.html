<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempo Trainer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <header class="app-header">
        <h1>Tempo Trainer</h1>
      </header>

      <main class="pane-container">
        <!-- Onboarding Pane -->
        <section id="pane-onboarding" class="pane">
          <onboarding-pane></onboarding-pane>
        </section>

        <!-- Plan Editing Pane -->
        <!-- Plan Edit Pane -->
        <plan-edit-pane id="pane-plan-edit" class="pane"></plan-edit-pane>

        <!-- Plan Play Pane -->
        <section id="pane-plan-play" class="pane">
          <div class="pane-content">
            <div class="play-header">
              <h2>Training Session</h2>
              <div class="session-info">
                <div class="control-group-inline">
                  <label for="bpm">BPM:</label>
                  <input type="number" id="bpm" value="120" min="40" max="300" />
                </div>
                <div class="control-group-inline">
                  <label for="time-signature">Time Signature:</label>
                  <select id="time-signature">
                    <option value="4/4" selected>4/4</option>
                    <option value="3/4">3/4</option>
                    <option value="2/4">2/4</option>
                    <option value="6/8">6/8</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="beat-display">
              <div class="beat-indicator"></div>
              <div id="status">Ready.</div>
            </div>

            <div class="play-controls">
              <button id="start-btn" class="primary-btn">Start</button>
              <button id="stop-btn" class="secondary-btn" disabled>Stop</button>
            </div>

            <div id="timeline-viewport" class="timeline-viewport">
              <div id="timeline-track"></div>
              <div id="timeline-now-line"></div>
            </div>

            <div id="overall-score" class="overall-score">Overall Score: 00</div>

            <div class="pane-actions">
              <button id="finish-play-btn" class="secondary-btn" data-pane="plan-history">
                View Results
              </button>
            </div>
          </div>
        </section>

        <!-- Plan History Pane -->
        <section id="pane-plan-history" class="pane">
          <div class="pane-content">
            <h2>Drill History</h2>
            <div id="drill-history" class="drill-history">
              <ul id="drill-history-list"></ul>
            </div>

            <div class="pane-actions">
              <button id="back-to-plan-btn" class="primary-btn" data-pane="plan-edit">
                Edit Another Plan
              </button>
            </div>
          </div>
        </section>
      </main>

      <nav class="pane-nav">
        <button class="pane-link" data-pane="onboarding" title="Setup">⚙️</button>
        <button class="pane-link" data-pane="plan-edit" title="Plan">📋</button>
        <button class="pane-link" data-pane="plan-play" title="Play">▶️</button>
        <button class="pane-link" data-pane="plan-history" title="History">📊</button>
      </nav>
    </div>

    <!-- Main application as ES module -->
    <script type="module" src="src/script.js"></script>
  </body>
</html>
