<template id="microphone-detector-template">
  <div class="microphone">
    <div class="microphone__section">
      <h3 class="microphone__title">Microphone Selection</h3>

      <div class="microphone__select-group">
        <label for="microphone-select" class="microphone__label">Choose a device:</label>
        <select class="microphone__select" id="microphone-select">
          <option value="">Select microphone...</option>
        </select>
      </div>

      <div class="microphone__level-container">
        <div class="microphone__level">
          <div class="microphone__level-bar"></div>
          <div class="microphone__peak-hold"></div>
          <div class="microphone__threshold-line"></div>
          <div class="microphone__threshold-label">Threshold</div>
        </div>
      </div>

      <div class="microphone__hits-list"></div>

      <div class="microphone__error" style="display: none"></div>

      <div class="microphone__status">Ready to detect hits</div>
    </div>
  </div>
</template>
