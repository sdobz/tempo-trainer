<div class="history-session" data-ref="sessionInner">
  <div
    class="history-session-header"
    data-ref="header"
    data-on-click="handleHeaderClick"
  >
    <div class="session-header-left">
      <div class="session-chevron">▼</div>
      <div class="session-score" data-ref="scoreEl"></div>
      <div class="session-plan" data-ref="planNameEl"></div>
    </div>
    <div class="session-header-right">
      <div class="session-status" data-ref="statusEl"></div>
      <div class="session-datetime" data-ref="datetimeEl"></div>
    </div>
  </div>
  <div class="session-details" data-details>
    <div data-ref="dynamicContent"></div>
    <div class="details-row">
      <div class="detail-section">
        <div class="detail-title">Plan Structure</div>
        <div class="detail-content">
          <div
            class="history-timeline-wrapper"
            data-ref="timelineWrapper"
            style="display: none; margin-bottom: 1em"
          >
            <timeline-visualization
              data-ref="sessionTimeline"
            ></timeline-visualization>
          </div>
          <plan-visualizer data-ref="planViz"></plan-visualizer>
        </div>
      </div>
    </div>
    <div class="session-actions">
      <button
        class="retry-session-btn"
        data-ref="retryBtn"
        data-on-click="handleRetryClick"
      >
        🔄 Retry This Plan
      </button>
      <button
        class="select-plan-btn"
        data-ref="selectPlanBtn"
        data-on-click="handleSelectPlanClick"
      >
        📋 Select Different Plan
      </button>
      <button
        class="delete-session-btn"
        data-ref="deleteBtn"
        data-on-click="handleDeleteClick"
      >
        🗑️ Delete Session
      </button>
    </div>
  </div>
</div>
