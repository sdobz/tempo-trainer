<template>
  <div class="pane-content">
    <h2>Welcome to Tempo Trainer</h2>
    <p>Set up hit detection once, then start training.</p>

    <div class="onboarding-steps">
      <section class="step" id="step-setup" data-step-setup>
        <h3>
          <span class="step-title">Tune Hit Detection</span>
          <span class="step-status" data-ref="setupStatus"
            >⚠️ Setup incomplete</span
          >
        </h3>
        <p class="step-description">
          Select your microphone and hit detection method, then calibrate
          sensitivity. You can adjust these later if needed.
        </p>
        <div class="detector-selector-row">
          <label for="detector-select">Detector:</label>
          <select
            id="detector-select"
            data-ref="detectorSelect"
            data-on-change="handleDetectorChange"
          >
            <option value="threshold">Threshold</option>
            <option value="adaptive">Adaptive / Spectral Flux</option>
          </select>
        </div>

        <div class="setup-section" id="step-microphone">
          <microphone-control data-compact></microphone-control>
        </div>

        <div class="setup-section" id="step-calibration">
          <calibration-control data-compact></calibration-control>
        </div>
      </section>

      <section class="step">
        <h3>Continue</h3>
        <p class="step-description">
          When setup is ready, continue to plan creation.
        </p>
        <button
          data-ref="completeBtn"
          data-on-click="handleCompleteClick"
          class="primary-btn"
          disabled
        >
          Go to Plan Editor
        </button>
      </section>
    </div>
  </div>
</template>
