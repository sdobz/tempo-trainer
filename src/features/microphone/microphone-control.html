<template>
  <div class="microphone-control">
    <h3>
      <span class="microphone-title">Select Microphone</span>
      <span class="microphone-status-indicator" data-ref="statusIndicator"
        >⚠️ Not configured</span
      >
    </h3>
    <div class="microphone-selector-row">
      <label for="microphone-select">Microphone:</label>
      <select data-ref="select" data-on-change="handleDeviceSelected" class="microphone-select"></select>
    </div>
    <div data-ref="level" data-on-pointerdown="handleSensitivityPointerDown" data-on-pointermove="handleSensitivityPointerMove" class="microphone-level">
      <div data-ref="levelBar" class="microphone-level-bar"></div>
      <div data-ref="peakHold" class="microphone-peak-hold"></div>
      <div
        data-ref="sensitivityLine"
        class="microphone-threshold-line"
      ></div>
      <div data-ref="sensitivityLabel" class="microphone-threshold-label">
        Sensitivity: 46%
      </div>
    </div>
  </div>
</template>
