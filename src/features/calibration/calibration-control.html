<template>
  <div class="calibration-control">
    <timeline-visualization
      data-ref="timelineEl"
      data-local-plan-only
    ></timeline-visualization>

    <div class="calibration-controls">
      <div class="calibration-top-row">
        <div class="calibration-offset-controls">
          <label for="calibration-offset-input">Offset (ms)</label>
          <div class="calibration-offset-row">
            <button type="button" class="offset-btn" data-ref="offsetDecBtn" data-on-click="handleNudgeOffsetDown">-</button>
            <input
              id="calibration-offset-input"
              data-ref="offsetInput"
              data-on-change="handleOffsetInputChanged"
              type="number"
              step="1"
              min="-300"
              max="300"
              value="0"
            />
            <button type="button" class="offset-btn" data-ref="offsetIncBtn" data-on-click="handleNudgeOffsetUp">+</button>
          </div>
        </div>

        <button data-ref="button" data-on-click="handleCalibrationButtonClick" type="button" class="calibration-btn">
          Auto Calibrate
        </button>
      </div>

      <div
        class="calibration-progress"
        aria-live="polite"
        data-ref="progressContainer"
      >
        <div
          class="calibration-progress-track"
          data-ref="progressTrack"
          role="progressbar"
          aria-label="Calibration completeness"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div
            data-ref="progressFill"
            class="calibration-progress-fill"
          ></div>
          <span
            data-ref="progressStatus"
            class="calibration-progress-status"
            >Hits 0/10</span
          >
        </div>
      </div>
    </div>
  </div>
</template>
